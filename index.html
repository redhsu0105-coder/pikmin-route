<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <title>皮克敏 WPT 終極工具箱 V20</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #fdfdfd; }
        .box { max-width: 700px; margin: auto; border: 2px solid #2e7d32; padding: 25px; border-radius: 12px; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2e7d32; margin-top: 0; border-bottom: 2px solid #e8f5e9; padding-bottom: 10px; }
        textarea { width: 100%; height: 200px; margin: 10px 0; border: 1px solid #ccc; padding: 10px; box-sizing: border-box; font-family: monospace; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        button { padding: 15px; cursor: pointer; font-weight: bold; border: none; border-radius: 6px; font-size: 15px; transition: 0.2s; }
        .btn-convert { background: #1976d2; color: white; grid-column: span 2; }
        .btn-plain { background: #607d8b; color: white; } /* 原始 WPT 路徑 */
        .btn-z { background: #4caf50; color: white; }
        .btn-mix { background: #ff9800; color: white; }
        button:hover { opacity: 0.9; }
        .info { font-size: 13px; color: #555; margin-top: 15px; background: #f1f8e9; padding: 12px; border-radius: 6px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🌸 皮克敏 WPT 工具箱 V20</h2>
        
        <textarea id="coordsInput" placeholder="在此貼入：
1. 座標清單 (緯度,經度)
2. 或 JoyStick 導出的 GPX XML 原始碼..."></textarea>
        
        <div class="btn-group">
            <button class="btn-convert" onclick="processConvert()">🔄 模式 1：JoyStick 格式直接轉 WPT</button>
            <button class="btn-plain" onclick="dl(0)">📍 模式 2：生成原始 WPT 純路徑</button>
            <button class="btn-z" onclick="dl(1)">⚡ 模式 3：生成 V18 密集 Z 掃描</button>
            <button class="btn-mix" onclick="dl(3)">🌀 模式 4：Z 掃描 + 2次直線串聯</button>
        </div>

        <div class="info">
            <strong>更新說明：</strong><br>
            • <b>原始 WPT：</b>補回模式 2，直接將輸入的座標點轉為 Fake GPS 可用的 <code>&lt;wpt&gt;</code>。<br>
            • <b>Z 字邏輯：</b>維持 V18 經過中心點最速路徑。<br>
            • <b>支援性：</b>輸入框可識別 XML 代碼或純文字座標。
        </div>
    </div>

    <script>
        function getCoords() {
            const input = document.getElementById('coordsInput').value.trim();
            if (!input) return [];
            if (input.includes('<')) {
                const parser = new DOMParser();
                const xml = parser.parseFromString(input, "text/xml");
                const points = xml.querySelectorAll('rtept, trkpt, wpt');
                return Array.from(points).map(p => ({
                    lat: parseFloat(p.getAttribute('lat')),
                    lon: parseFloat(p.getAttribute('lon'))
                })).filter(c => !isNaN(c.lat));
            }
            return input.split('\n').map(l => {
                const p = l.split(/[ ,]+/);
                return { lat: parseFloat(p[0]), lon: parseFloat(p[1]) };
            }).filter(c => !isNaN(c.lat));
        }

        function downloadGPX(body, filename) {
            const head = '<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="PikminTool-V20" xmlns="http://www.topografix.com/GPX/1/1">\n';
            const foot = '</gpx>';
            const blob = new Blob([head + body + foot], { type: "application/gpx+xml" });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url; a.download = filename; a.click();
            window.URL.revokeObjectURL(url);
        }

        function processConvert() {
            const coords = getCoords();
            if (coords.length === 0) return alert('偵測不到有效座標！');
            let body = "";
            coords.forEach((c, i) => {
                body += `  <wpt lat="${c.lat.toFixed(8)}" lon="${c.lon.toFixed(8)}"><name>${String(i+1).padStart(3, '0')}</name></wpt>\n`;
            });
            downloadGPX(body, "JoyStick轉WPT.gpx");
        }

        function dl(mode) {
            const coords = getCoords();
            if (coords.length === 0) return alert('請先輸入資料！');
            let body = "";
            let pIdx = 1;

            const addWpt = (lat, lon) => {
                body += `  <wpt lat="${lat.toFixed(8)}" lon="${lon.toFixed(8)}"><name>${String(pIdx++).padStart(3, '0')}</name></wpt>\n`;
            };

            const makeZ = (c) => {
                const la = c.lat; const lo = c.lon;
                const dLat = 30 / 111320;
                const dLon = 30 / (111320 * Math.cos(la * Math.PI / 180));
                addWpt(la - dLat, lo - dLon); // 左下
                addWpt(la + dLat, lo - dLon); // 左上
                addWpt(la, lo);               // 中心
                addWpt(la - dLat, lo + dLon); // 右下
                addWpt(la + dLat, lo + dLon); // 右上
            };

            const makeLine = (pts) => pts.forEach(c => addWpt(c.lat, c.lon));

            if (mode === 0) {
                // 原始 WPT 純路徑 (模式 2)
                makeLine(coords);
                downloadGPX(body, "原始WPT路徑.gpx");
            } else {
                // Z 字相關 (模式 3 & 4)
                if (mode === 1 || mode === 3) coords.forEach(c => makeZ(c));
                if (mode === 3) { makeLine(coords); makeLine(coords); }
                downloadGPX(body, mode === 1 ? "密集Z掃描.gpx" : "綜合模式_Z加直線.gpx");
            }
        }
    </script>
</body>
</html>
