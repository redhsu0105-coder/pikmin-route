<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta charset="utf-8">
    <title>皮克敏 WPT 路徑生成器</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background-color: #f9f9f9; }
        h2 { color: #2e7d32; border-bottom: 2px solid #2e7d32; padding-bottom: 10px; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 180px; margin: 10px 0; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-family: monospace; }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        button { flex: 1; padding: 12px; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 4px; font-weight: bold; font-size: 14px; }
        button:hover { background: #45a049; }
        .tips { font-size: 0.85em; color: #666; margin-top: 15px; background: #fff3e0; padding: 10px; border-left: 4px solid #ff9800; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🌸 皮克敏 WPT 格式生成器</h2>
        <p>請將座標貼在下方（每行一組，例如：<code>60.1228, 11.4626</code>）：</p>
        
        <textarea id="coordsInput" placeholder="60.1228700, 11.4626370&#10;60.1206390, 11.4612330&#10;..."></textarea>

        <div class="btn-group">
            <button onclick="processGPX('z')">1. 效率 Z字形 (30m)</button>
            <button onclick="processGPX('linear')">2. 直線串聯</button>
            <button onclick="processGPX('mixed')">3. Z + 2次直線串聯</button>
        </div>

        <div class="tips">
            <strong>使用提示：</strong><br>
            • 儲存此檔案時，請確保選擇 <b>UTF-8</b> 編碼。<br>
            • 下載的檔案為 .gpx 格式，直接匯入 GPS JoyStick 即可使用。
        </div>
    </div>

    <script>
        function processGPX(type) {
            const input = document.getElementById('coordsInput').value.trim();
            if (!input) return alert('請輸入座標！');

            const lines = input.split('\n');
            const coords = lines.map(l => {
                const p = l.split(/[ ,]+/);
                return { lat: p[0], lon: p[1] };
            }).filter(c => !isNaN(parseFloat(c.lat)));

            let wpts = "";
            const start = coords[0];
            const lat = parseFloat(start.lat);
            const lon = parseFloat(start.lon);

            // 模式 1 & 3: Z 字形處理
            if (type === 'z' || type === 'mixed') {
                const dLat = 0.00027; // 約 30m
                const dLon = 0.00045; // 約 30-40m
                const zPoints = [
                    {la: lat, lo: lon, n: "Z1"},
                    {la: lat, lo: lon + dLon, n: "Z2"},
                    {la: lat - dLat, lo: lon + dLon, n: "Z3"},
                    {la: lat - dLat, lo: lon, n: "Z4"},
                    {la: lat - (dLat*2), lo: lon, n: "Z5"},
                    {la: lat - (dLat*2), lo: lon + dLon, n: "Z6"}
                ];
                zPoints.forEach(p => wpts += `  <wpt lat="${p.la}" lon="${p.lo}"><name>${p.n}</name></wpt>\n`);
            }

            // 模式 2 & 3: 直線串聯處理
            if (type === 'linear' || type === 'mixed') {
                const loops = type === 'mixed' ? 2 : 1;
                for (let i = 0; i < loops; i++) {
                    coords.forEach((c, idx) => {
                        wpts += `  <wpt lat="${c.lat}" lon="${c.lon}"><name>L${i+1}-P${idx+1}</name></wpt>\n`;
                    });
                }
            }

            const gpxHeader = '<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="PikminTool">\n';
            const gpxFooter = '</gpx>';
            download(`${type}_path.gpx`, gpxHeader + wpts + gpxFooter);
        }

        function download(filename, text) {
            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/xml;charset=utf-8,' + encodeURIComponent(text));
            element.setAttribute('download', filename);
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
        }
    </script>
</body>
</html>
