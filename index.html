<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <title>皮克敏 WPT 專業生成器</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; }
        .box { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2e7d32; text-align: center; border-bottom: 2px solid #81c784; padding-bottom: 10px; }
        textarea { width: 100%; height: 200px; margin: 15px 0; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-family: monospace; box-sizing: border-box; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        button { padding: 16px; cursor: pointer; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; transition: 0.2s; }
        .btn-z { background: #4caf50; } 
        .btn-line { background: #2196f3; } 
        .btn-mix { background: #ff9800; }
        button:hover { opacity: 0.9; }
        .footer { font-size: 13px; color: #666; background: #e8f5e9; padding: 15px; margin-top: 15px; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🌸 皮克敏專業 Z 字生成器</h2>
        <textarea id="coordsInput" placeholder="請貼入大花座標清單..."></textarea>
        
        <div class="btn-group">
            <button class="btn-z" onclick="dl(1)">1. 下載：效率模式 (專業 Z 字掃描)</button>
            <button class="btn-line" onclick="dl(2)">2. 下載：直線串聯</button>
            <button class="btn-mix" onclick="dl(3)">3. 下載：專業 Z 字 + 2次直線串聯</button>
        </div>

        <div class="footer">
            <strong>路徑邏輯（完全依照 F挪威02Z 檔案）：</strong><br>
            • <b>專業 Z 字：</b>每個點生成 5 個偏移點位，形成密集 N 字型掃描，半徑約 30m。<br>
            • <b>輸出：</b>WPT 格式，.gpx 副檔名，無贅餘標籤。
        </div>
    </div>

    <script>
        function dl(mode) {
            const input = document.getElementById('coordsInput').value.trim();
            if (!input) return alert('請貼入座標！');

            const coords = input.split('\n').map(l => {
                const p = l.split(/[ ,]+/);
                return { lat: parseFloat(p[0]), lon: parseFloat(p[1]) };
            }).filter(c => !isNaN(c.lat));

            let body = "";
            let pIdx = 1;

            // 根據 F挪威02Z 檔案拆解出的精確偏移量 (約 30m)
            const d = 0.00028; 

            function addWpt(lat, lon) {
                body += `  <wpt lat="${lat.toFixed(8)}" lon="${lon.toFixed(8)}"><name>P${pIdx++}</name></wpt>\n`;
            }

            function makeZ(c) {
                const lat = c.lat;
                const lon = c.lon;
                // F挪威02Z 的密集轉折邏輯：左下 -> 左上 -> 右下 -> 右上 -> 原點
                addWpt(lat - d, lon - d); 
                addWpt(lat + d, lon - d);
                addWpt(lat - d, lon + d);
                addWpt(lat + d, lon + d);
                addWpt(lat, lon);
            }

            function makeLine(pts) {
                pts.forEach(c => addWpt(c.lat, c.lon));
            }

            let fname = "";
            if (mode === 1) {
                fname = "效率掃描_Z.gpx";
                coords.forEach(c => makeZ(c));
            } else if (mode === 2) {
                fname = "直線串聯.gpx";
                makeLine(coords);
            } else if (mode === 3) {
                fname = "綜合模式_Z加直線.gpx";
                coords.forEach(c => makeZ(c));
                makeLine(coords);
                makeLine(coords);
            }

            const head = '<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="PikminToolV8">\n';
            const foot = '</gpx>';
            
            const blob = new Blob([head + body + foot], { type: "application/gpx+xml" });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = fname;
            a.click();
            window.URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
