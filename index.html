<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <title>皮克敏 WPT 專業掃描生成器</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #fdfdfd; }
        .container { max-width: 700px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #1b5e20; text-align: center; border-bottom: 2px solid #81c784; padding-bottom: 10px; }
        textarea { width: 100%; height: 200px; margin: 10px 0; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-family: monospace; box-sizing: border-box; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        button { padding: 15px; cursor: pointer; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; }
        .btn-1 { background: #4caf50; } .btn-2 { background: #2196f3; } .btn-3 { background: #ff9800; }
        .note { font-size: 13px; color: #444; background: #e8f5e9; padding: 15px; margin-top: 15px; border-radius: 6px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🌸 皮克敏專業級掃描生成器</h2>
        <textarea id="coordsInput" placeholder="請貼入原始座標清單..."></textarea>
        
        <div class="btn-group">
            <button class="btn-1" onclick="make(1)">1. 下載：效率模式 (移動中大範圍 Z 字掃描)</button>
            <button class="btn-2" onclick="make(2)">2. 下載：直線串聯</button>
            <button class="btn-3" onclick="make(3)">3. 下載：Z 字掃描 + 2次直線串聯</button>
        </div>

        <div class="note">
            <strong>掃描邏輯修正：</strong><br>
            • <b>專業 Z 字：</b>仿照範例檔，在前往下一個座標點的途中，每段路徑會自動插入 4 個左右擺動的偏移點（半徑 30m），形成鋸齒狀掃描路徑。<br>
            • <b>輸出格式：</b>WPT 標籤，副檔名 .gpx。
        </div>
    </div>

    <script>
        function make(mode) {
            const input = document.getElementById('coordsInput').value.trim();
            if (!input) return alert('請輸入座標！');

            const coords = input.split('\n').map(line => {
                const p = line.split(/[ ,]+/);
                return { lat: parseFloat(p[0]), lon: parseFloat(p[1]) };
            }).filter(c => !isNaN(c.lat));

            let body = "";
            let count = 1;
            const offset = 0.00035; // 左右擺動幅度 (約 35-40m)

            function addWpt(lat, lon) {
                body += `  <wpt lat="${lat.toFixed(8)}" lon="${lon.toFixed(8)}"><name>P${count++}</name></wpt>\n`;
            }

            // --- 邏輯 A：專業 Z 字掃描 (在移動路徑上擺動) ---
            function runZScan() {
                for (let i = 0; i < coords.length - 1; i++) {
                    const p1 = coords[i];
                    const p2 = coords[i+1];
                    
                    addWpt(p1.lat, p1.lon); // 起點

                    // 在 p1 到 p2 之間插入 4 個鋸齒點 (仿照範例檔路徑)
                    const m1 = { lat: p1.lat + (p2.lat - p1.lat) * 0.25, lon: p1.lon + (p2.lon - p1.lon) * 0.25 };
                    const m2 = { lat: p1.lat + (p2.lat - p1.lat) * 0.50, lon: p1.lon + (p2.lon - p1.lon) * 0.50 };
                    const m3 = { lat: p1.lat + (p2.lat - p1.lat) * 0.75, lon: p1.lon + (p2.lon - p1.lon) * 0.75 };

                    addWpt(m1.lat + offset, m1.lon - offset); // 擺向左上
                    addWpt(m2.lat - offset, m2.lon + offset); // 擺向右下
                    addWpt(m3.lat + offset, m3.lon - offset); // 擺向左上
                }
                const last = coords[coords.length-1];
                addWpt(last.lat, last.lon);
            }

            // --- 邏輯 B：直線串聯 ---
            function runLinear() {
                coords.forEach(p => addWpt(p.lat, p.lon));
            }

            // 分流處理
            if (mode === 1) {
                runZScan();
            } else if (mode === 2) {
                runLinear();
            } else if (mode === 3) {
                runZScan();
                runLinear();
                runLinear();
            }

            const header = '<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="PikminPathGen-V7">\n';
            const footer = '</gpx>';
            
            const blob = new Blob([header + body + footer], { type: "application/gpx+xml" });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            const names = ["效率掃描.gpx", "直線串聯.gpx", "綜合模式.gpx"];
            a.download = names[mode-1];
            a.click();
            window.URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
