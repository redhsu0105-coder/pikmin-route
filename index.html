<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <title>皮克敏 WPT 路徑生成器</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eef2f3; line-height: 1.6; }
        .container { background: white; padding: 25px; border-radius: 15px; max-width: 700px; margin: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { color: #2e7d32; text-align: center; border-bottom: 2px solid #a5d6a7; padding-bottom: 10px; }
        textarea { width: 100%; height: 200px; box-sizing: border-box; margin: 10px 0; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-family: monospace; font-size: 14px; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        button { padding: 15px; cursor: pointer; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; transition: 0.3s; }
        .btn-1 { background: #66bb6a; } /* 效率模式 */
        .btn-2 { background: #42a5f5; } /* 直線串聯 */
        .btn-3 { background: #ff7043; } /* 綜合模式 */
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        .hint { font-size: 13px; color: #555; margin-top: 15px; background: #fff8e1; padding: 10px; border-radius: 5px; border-left: 5px solid #ffb300; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🌸 皮克敏 WPT 路徑生成器</h2>
        <p>請貼入座標點（格式：緯度, 經度）：</p>
        <textarea id="coordsInput" placeholder="60.12287, 11.46263&#10;60.12063, 11.46123"></textarea>
        
        <div class="btn-group">
            <button class="btn-1" onclick="generate(1)">1. 效率模式 (每點跑 Z 字形)</button>
            <button class="btn-2" onclick="generate(2)">2. 直線串聯 (僅點對點)</button>
            <button class="btn-3" onclick="generate(3)">3. 綜合模式 (每點 Z 字 + 2次直線)</button>
        </div>

        <div class="hint">
            <strong>使用說明：</strong><br>
            • <b>Z 字形半徑：</b>設定為約 30 公尺，確保種花覆蓋率。<br>
            • <b>WPT 格式：</b>匯入後請確保模擬工具關閉「自動排序」。<br>
            • <b>存檔提醒：</b>請確保此網頁檔案以 <b>UTF-8</b> 編碼儲存。
        </div>
    </div>

    <script>
        function generate(type) {
            const input = document.getElementById('coordsInput').value.trim();
            if (!input) { alert('請輸入座標！'); return; }

            const lines = input.split('\n');
            const coords = lines.map(l => {
                const p = l.split(/[ ,]+/);
                return { lat: parseFloat(p[0]), lon: parseFloat(p[1]) };
            }).filter(c => !isNaN(c.lat) && !isNaN(c.lon));

            if (coords.length === 0) { alert('座標格式錯誤！'); return; }

            let body = "";
            const dLat = 0.00027; // 約 30m
            const dLon = 0.00045; // 約 30-40m

            // 輔助函式：生成單個點位的 Z 字 wpt 段
            function makeZ(c, idx) {
                let s = "";
                const lat = c.lat;
                const lon = c.lon;
                const zPts = [
                    {la: lat, lo: lon, n: `P${idx}-Z1`},
                    {la: lat, lo: lon + dLon, n: `P${idx}-Z2`},
                    {la: lat - dLat, lo: lon + dLon, n: `P${idx}-Z3`},
                    {la: lat - dLat, lo: lon, n: `P${idx}-Z4`},
                    {la: lat - (dLat*2), lo: lon, n: `P${idx}-Z5`},
                    {la: lat - (dLat*2), lo: lon + dLon, n: `P${idx}-Z6`},
                    {la: lat, lo: lon, n: `P${idx}-End`}
                ];
                zPts.forEach(p => {
                    s += `  <wpt lat="${p.la.toFixed(8)}" lon="${p.lo.toFixed(8)}"><name>${p.n}</name></wpt>\n`;
                });
                return s;
            }

            // --- 邏輯分支 ---
            
            // 選項 1 & 3: 執行每點 Z 字形
            if (type === 1 || type === 3) {
                coords.forEach((c, i) => {
                    body += makeZ(c, i + 1);
                });
            }

            // 選項 2 & 3: 執行直線串聯
            if (type === 2 || type === 3) {
                const loops = (type === 3) ? 2 : 1;
                for (let l = 1; l <= loops; l++) {
                    coords.forEach((c, i) => {
                        body += `  <wpt lat="${c.lat.toFixed(8)}" lon="${c.lon.toFixed(8)}"><name>Loop${l}-P${i+1}</name></wpt>\n`;
                    });
                }
            }

            const header = '<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="PikminTool">\n';
            const footer = '</gpx>';
            const fullContent = header + body + footer;

            // 下載行為
            const filenames = { 1: "效率模式_Z字.gpx", 2: "直線串聯.gpx", 3: "綜合模式_Z加直線.gpx" };
            const blob = new Blob([fullContent], { type: "application/gpx+xml" });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = filenames[type];
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        }
    </script>
</body>
</html>
