<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <title>皮克敏 WPT 專業生成器 V14</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #fdfdfd; }
        .box { max-width: 650px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #d32f2f; text-align: center; border-bottom: 2px solid #ef9a9a; padding-bottom: 10px; }
        textarea { width: 100%; height: 200px; margin: 15px 0; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-family: monospace; box-sizing: border-box; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        button { padding: 16px; cursor: pointer; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; }
        .btn-z { background: #388e3c; } .btn-line { background: #1976d2; } .btn-mix { background: #f57c00; }
        .footer { font-size: 13px; color: #555; background: #fafafa; padding: 15px; margin-top: 15px; border: 1px dashed #ccc; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🌸 皮克敏 WPT 路徑工具 V14</h2>
        <p style="font-size:14px; color: #666;">輸入的座標將被視為「大花中心點」</p>
        <textarea id="coordsInput" placeholder="請貼入 14 個中心點座標..."></textarea>
        
        <div class="btn-group">
            <button class="btn-z" onclick="dl(1)">1. 下載：效率模式 (每個點半徑 30m Z 掃描)</button>
            <button class="btn-line" onclick="dl(2)">2. 下載：直線串聯</button>
            <button class="btn-mix" onclick="dl(3)">3. 下載：Z 掃描 + 2次直線串聯</button>
        </div>

        <div class="footer">
            <strong>V14 核心修正：</strong><br>
            • <b>真正正方形：</b>自動偵測緯度並修正經度長度，解決在高緯度變成長方形的問題。<br>
            • <b>精確半徑：</b>以 30m 為偏移量，總掃描寬度為 60m，確保覆蓋大花。<br>
            • <b>五點掃描：</b>左下 → 左上 → 中心 → 右下 → 右上。
        </div>
    </div>

    <script>
        function dl(mode) {
            const input = document.getElementById('coordsInput').value.trim();
            if (!input) return alert('請輸入座標！');
            const coords = input.split('\n').map(l => {
                const p = l.split(/[ ,]+/);
                return { lat: parseFloat(p[0]), lon: parseFloat(p[1]) };
            }).filter(c => !isNaN(c.lat));

            let body = "";
            let pIdx = 1;

            function addWpt(lat, lon) {
                body += `  <wpt lat="${lat.toFixed(8)}" lon="${lon.toFixed(8)}"><name>P${pIdx++}</name></wpt>\n`;
            }

            function makeZ(c) {
                const la = c.lat; 
                const lo = c.lon;

                // --- 每一點都重新計算比例，解決不同地點變形的問題 ---
                // 111320 是赤道上的長度
                const dLat = 30 / 111320; 
                const dLon = 30 / (111320 * Math.cos(la * Math.PI / 180));

                // 照 F挪威02Z 的 N字型掃描順序
                addWpt(la - dLat, lo - dLon); // 左下
                addWpt(la + dLat, lo - dLon); // 左上
                addWpt(la, lo);               // 回中心點
                addWpt(la - dLat, lo + dLon); // 右下
                addWpt(la + dLat, lo + dLon); // 右上
                addWpt(la, lo);               // 回中心點準備去下一朵
            }

            function makeLine(pts) { pts.forEach(c => addWpt(c.lat, c.lon)); }

            let fname = "";
            if (mode === 1) {
                fname = "效率掃描_Z.gpx";
                coords.forEach(c => makeZ(c));
            } else if (mode === 2) {
                fname = "直線串聯.gpx";
                makeLine(coords);
            } else if (mode === 3) {
                fname = "綜合模式_Z加2直線.gpx";
                coords.forEach(c => makeZ(c)); // 1. 每個點跑 Z 字
                makeLine(coords);             // 2. 跑第一次單點串聯
                makeLine(coords);             // 3. 跑第二次單點串聯
            }

            const head = '<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="PikminToolV14">\n';
            const foot = '</gpx>';
            
            const blob = new Blob([head + body + foot], { type: "application/gpx+xml" });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url; a.download = fname; a.click();
            window.URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
