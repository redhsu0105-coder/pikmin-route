<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <title>皮克敏 WPT 專業生成器 V16</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #fff; }
        .box { max-width: 600px; margin: auto; border: 2px solid #333; padding: 25px; border-radius: 8px; }
        textarea { width: 100%; height: 180px; margin: 10px 0; font-family: monospace; }
        button { width: 100%; padding: 15px; margin-top: 10px; cursor: pointer; font-weight: bold; background: #eee; border: 1px solid #333; }
        button:hover { background: #ddd; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🌸 皮克敏 WPT 最終修正 V16</h2>
        <textarea id="coordsInput" placeholder="請貼入中心點座標..."></textarea>
        <button onclick="dl(1)">1. 下載：效率模式 (密集 Z 掃描)</button>
        <button onclick="dl(2)">2. 下載：直線串聯</button>
        <button onclick="dl(3)">3. 下載：Z 掃描 + 2次直線串聯</button>
    </div>

    <script>
        function dl(mode) {
            const input = document.getElementById('coordsInput').value.trim();
            if (!input) return;
            const coords = input.split('\n').map(l => {
                const p = l.split(/[ ,]+/);
                return { lat: parseFloat(p[0]), lon: parseFloat(p[1]) };
            }).filter(c => !isNaN(c.lat));

            let body = "";
            let pIdx = 1;

            // 嚴格還原 F挪威02Z(17).gpx 的視覺比例 (約半徑 30m)
            const latOff = 0.000227; 
            const lonOff = 0.001131;

            function addWpt(lat, lon) {
                body += `  <wpt lat="${lat.toFixed(8)}" lon="${lon.toFixed(8)}"><name>P${pIdx++}</name></wpt>\n`;
            }

            function makeZ(c) {
                const la = c.lat; const lo = c.lon;
                // 順序：左下 -> 左上 -> 中心 -> 右下 -> 右上
                addWpt(la - latOff, lo - lonOff); 
                addWpt(la + latOff, lo - lonOff); 
                addWpt(la, lo);               
                addWpt(la - latOff, lo + lonOff); 
                addWpt(la + latOff, lo + lonOff); 
            }

            function makeLine(pts) { pts.forEach(c => addWpt(c.lat, c.lon)); }

            let fname = mode === 1 ? "效率掃描_Z.gpx" : mode === 2 ? "直線串聯.gpx" : "綜合模式.gpx";
            if (mode === 1 || mode === 3) coords.forEach(c => makeZ(c));
            if (mode === 2 || mode === 3) { makeLine(coords); if(mode === 3) makeLine(coords); }

            const head = '<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="V16">\n';
            const foot = '</gpx>';
            const blob = new Blob([head + body + foot], { type: "application/gpx+xml" });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url; a.download = fname; a.click();
        }
    </script>
</body>
</html>
