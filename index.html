<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <title>皮克敏 WPT 專業生成器 V18</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #fff; }
        .box { max-width: 600px; margin: auto; border: 2px solid #2e7d32; padding: 25px; border-radius: 8px; }
        h2 { text-align: center; color: #2e7d32; margin-top: 0; }
        textarea { width: 100%; height: 180px; margin: 10px 0; border: 1px solid #ccc; padding: 10px; box-sizing: border-box; }
        .btn-group { display: flex; flex-direction: column; gap: 8px; }
        button { padding: 15px; cursor: pointer; font-weight: bold; background: #4caf50; color: white; border: none; border-radius: 4px; font-size: 16px; }
        button:hover { background: #43a047; }
        .info { font-size: 13px; color: #666; margin-top: 15px; background: #f1f8e9; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🌸 皮克敏 WPT 路徑生成器 V18</h2>
        <textarea id="coordsInput" placeholder="請貼入大花中心點座標..."></textarea>
        <div class="btn-group">
            <button onclick="dl(1)">1. 下載：密集 Z 掃描 (經過中心不回頭)</button>
            <button onclick="dl(2)">2. 下載：直線串聯 (中心點對連)</button>
            <button onclick="dl(3)">3. 下載：密集 Z + 2次直線串聯</button>
        </div>
        <div class="info">
            <strong>路徑逻辑完全同步挪威檔：</strong><br>
            1. 左下偏移點 ➔ 2. 左上偏移點 ➔ <b>3. 中心點 (經過)</b> ➔ 4. 右下偏移點 ➔ 5. 右上偏移點。<br>
            跑完第 5 點直接前往下一個地點，不補點。
        </div>
    </div>

    <script>
        function dl(mode) {
            const input = document.getElementById('coordsInput').value.trim();
            if (!input) return alert('請輸入座標');
            const coords = input.split('\n').map(l => {
                const p = l.split(/[ ,]+/);
                return { lat: parseFloat(p[0]), lon: parseFloat(p[1]) };
            }).filter(c => !isNaN(c.lat));

            let body = "";
            let pIdx = 1;

            // 根據 F挪威02Z 數據：dLat = 0.000348 (半徑差約 30m)
            // 經度偏移量會隨緯度自動修正比例
            function addWpt(lat, lon) {
                body += `  <wpt lat="${lat.toFixed(8)}" lon="${lon.toFixed(8)}"><name>P${pIdx++}</name></wpt>\n`;
            }

            function makeZ(c) {
                const la = c.lat; const lo = c.lon;
                // 自動計算比例，確保在任何地方看起來都是正方形 (半徑30m，總寬60m)
                const dLat = 30 / 111320;
                const dLon = 30 / (111320 * Math.cos(la * Math.PI / 180));

                // 照您的檔案：1(左下) -> 2(左上) -> 3(中心) -> 4(右下) -> 5(右上)
                addWpt(la - dLat, lo - dLon); // 1
                addWpt(la + dLat, lo - dLon); // 2
                addWpt(la, lo);               // 3 (經過中心)
                addWpt(la - dLat, lo + dLon); // 4
                addWpt(la + dLat, lo + dLon); // 5
            }

            function makeLine(pts) { pts.forEach(c => addWpt(c.lat, c.lon)); }

            let fname = mode === 1 ? "效率掃描_Z.gpx" : mode === 2 ? "直線串聯.gpx" : "綜合模式.gpx";
            
            if (mode === 1 || mode === 3) coords.forEach(c => makeZ(c));
            if (mode === 2 || mode === 3) { makeLine(coords); if(mode === 3) makeLine(coords); }

            const head = '<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="V18_Direct">\n';
            const foot = '</gpx>';
            const blob = new Blob([head + body + foot], { type: "application/gpx+xml" });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url; a.download = fname; a.click();
        }
    </script>
</body>
</html>
