<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <title>皮克敏最速種花生成器</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #fdfdfd; }
        .container { max-width: 700px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2e7d32; text-align: center; }
        textarea { width: 100%; height: 200px; margin: 10px 0; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-family: monospace; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        button { padding: 15px; cursor: pointer; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; }
        .btn-1 { background: #4caf50; } 
        .btn-2 { background: #2196f3; } 
        .btn-3 { background: #ff9800; }
        button:hover { opacity: 0.9; }
        .note { font-size: 13px; color: #666; background: #f1f8e9; padding: 15px; margin-top: 15px; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🌸 皮克敏最速種花生成器</h2>
        <textarea id="coordsInput" placeholder="請貼入座標清單..."></textarea>
        
        <div class="btn-group">
            <button class="btn-1" onclick="generate(1)">1. 效率模式 (蛇行 Z 字前進)</button>
            <button class="btn-2" onclick="generate(2)">2. 直線串聯</button>
            <button class="btn-3" onclick="generate(3)">3. 效率 Z 字跑一次 + 2次直線串聯</button>
        </div>

        <div class="note">
            <strong>效率 Z 字邏輯：</strong><br>
            系統會計算點與點之間的向量，並在移動路徑上自動產生左右各 15 公尺（半徑）的偏移點，形成蛇行軌跡。這是目前最節省花瓣且能覆蓋最大路寬的跑法。
        </div>
    </div>

    <script>
        function generate(mode) {
            const input = document.getElementById('coordsInput').value.trim();
            if (!input) return alert('請輸入座標！');

            const coords = input.split('\n').map(line => {
                const p = line.split(/[ ,]+/);
                return { lat: parseFloat(p[0]), lon: parseFloat(p[1]) };
            }).filter(c => !isNaN(c.lat));

            let body = "";
            const offsetDist = 0.00015; // 左右偏移約 15m，總寬 30m

            // 模式 1 & 3 的蛇行 Z 字邏輯
            function makeEfficiencyZ(points) {
                let s = "";
                for (let i = 0; i < points.length - 1; i++) {
                    const p1 = points[i];
                    const p2 = points[i+1];
                    
                    // 加入起點
                    s += `  <wpt lat="${p1.lat.toFixed(8)}" lon="${p1.lon.toFixed(8)}"><name>P${i+1}-Start</name></wpt>\n`;
                    
                    // 計算中點並產生偏移點 (Z 字轉折)
                    const midLat = (p1.lat + p2.lat) / 2;
                    const midLon = (p1.lon + p2.lon) / 2;
                    
                    // 簡單的法向量偏移
                    s += `  <wpt lat="${(midLat + offsetDist).toFixed(8)}" lon="${(midLon + offsetDist).toFixed(8)}"><name>P${i+1}-Z-Left</name></wpt>\n`;
                    s += `  <wpt lat="${(midLat - offsetDist).toFixed(8)}" lon="${(midLon - offsetDist).toFixed(8)}"><name>P${i+1}-Z-Right</name></wpt>\n`;
                }
                // 加入最後一個終點
                const last = points[points.length-1];
                s += `  <wpt lat="${last.lat.toFixed(8)}" lon="${last.lon.toFixed(8)}"><name>P-End</name></wpt>\n`;
                return s;
            }

            // 直線串聯邏輯
            function makeLinear(points, loopName) {
                let s = "";
                points.forEach((p, idx) => {
                    s += `  <wpt lat="${p.lat.toFixed(8)}" lon="${p.lon.toFixed(8)}"><name>${loopName}-P${idx+1}</name></wpt>\n`;
                });
                return s;
            }

            // --- 執行分流 ---
            if (mode === 1 || mode === 3) {
                body += makeEfficiencyZ(coords);
            }
            if (mode === 2) {
                body += makeLinear(coords, "L1");
            }
            if (mode === 3) {
                body += makeLinear(coords, "Sprint1");
                body += makeLinear(coords, "Sprint2");
            }

            const header = '<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="Efficiency-Pikmin">\n';
            const footer = '</gpx>';
            download(`Pikmin_Mode${mode}.gpx`, header + body + footer);
        }

        function download(filename, text) {
            const blob = new Blob([text], { type: "application/gpx+xml" });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = filename;
            a.click();
            window.URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
