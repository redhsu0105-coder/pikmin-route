```html
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Pikmin Bloom Route Generator</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:30px;
max-width:800px;
margin:auto
}

textarea{
width:100%;
height:200px;
font-size:14px
}

button{
padding:12px 20px;
font-size:16px;
margin-top:10px;
cursor:pointer
}

.downloads a{
display:block;
margin-top:10px;
font-size:16px
}

</style>
</head>

<body>

<h2>🌸 Pikmin Bloom WPT Route Generator</h2>

<p>貼上座標 (lat,lon 一行一個)</p>

<textarea id="coords"></textarea>

<br>

<button onclick="generate()">生成路徑</button>

<div class="downloads" id="downloads"></div>

<script>

const R=6378137

function offset(lat,lon,dx,dy){

let dlat=(dy/R)*(180/Math.PI)

let dlon=(dx/(R*Math.cos(lat*Math.PI/180)))*(180/Math.PI)

return [lat+dlat,lon+dlon]

}

function zigzag(points,radius=30){

let result=[]
let toggle=1

for(let i=0;i<points.length-1;i++){

let [lat1,lon1]=points[i]
let [lat2,lon2]=points[i+1]

let dx=lon2-lon1
let dy=lat2-lat1

let len=Math.sqrt(dx*dx+dy*dy)
if(len==0) continue

let px=-dy/len
let py=dx/len

let ox=px*radius*toggle
let oy=py*radius*toggle

let p=offset(lat1,lon1,ox,oy)

result.push([lat1,lon1])
result.push(p)

toggle*=-1

}

result.push(points[points.length-1])

return result

}

function download(name,data){

let text=data.map(p=>p[0]+","+p[1]).join("\n")

let blob=new Blob([text],{type:"text/plain"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)
a.download=name
a.innerText="下載 "+name

document.getElementById("downloads").appendChild(a)

}

function generate(){

let raw=document.getElementById("coords").value.trim().split("\n")

let coords=[]

raw.forEach(line=>{

let p=line.split(",")

coords.push([parseFloat(p[0]),parseFloat(p[1])])

})

let zig=zigzag(coords,30)
let straight=coords
let combo=zig.concat(straight).concat(straight)

document.getElementById("downloads").innerHTML=""

download("01_zigzag_30m.wpt",zig)
download("02_straight.wpt",straight)
download("03_zigzag_plus_two_straight.wpt",combo)

}

</script>

</body>
</html>
```
