<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <title>皮克敏 WPT 終極生成器 V15</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #fdfdfd; }
        .box { max-width: 650px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #d32f2f; text-align: center; border-bottom: 2px solid #ef9a9a; padding-bottom: 10px; }
        textarea { width: 100%; height: 200px; margin: 15px 0; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-family: monospace; box-sizing: border-box; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        button { padding: 16px; cursor: pointer; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; }
        .btn-z { background: #388e3c; } .btn-line { background: #1976d2; } .btn-mix { background: #f57c00; }
        .footer { font-size: 13px; color: #555; background: #fafafa; padding: 15px; margin-top: 15px; border: 1px dashed #ccc; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🌸 皮克敏 WPT 終極工具 V15</h2>
        <p style="font-size:14px; color: #666;">針對「挪威檔」數據比例完全還原</p>
        <textarea id="coordsInput" placeholder="請貼入您的 14 個中心點座標..."></textarea>
        
        <div class="btn-group">
            <button class="btn-z" onclick="dl(1)">1. 下載：效率模式 (還原範例 Z 走法)</button>
            <button class="btn-line" onclick="dl(2)">2. 下載：直線串聯</button>
            <button class="btn-mix" onclick="dl(3)">3. 下載：專業 Z 掃描 + 2次直線串聯</button>
        </div>

        <div class="footer">
            <strong>V15 終極修正：</strong><br>
            • <b>連線順序：</b>修正為「左下 > 左上 > 中心 > 右下 > 右上」，確保 Z 形狀正確。<br>
            • <b>經緯度比例：</b>直接採用您檔案中的緯度/經度 1:5 的特殊比例，確保形狀不再「長方」。<br>
            • <b>WPT 名稱：</b>自動產生流水號名稱。
        </div>
    </div>

    <script>
        function dl(mode) {
            const input = document.getElementById('coordsInput').value.trim();
            if (!input) return alert('請輸入座標！');
            const coords = input.split('\n').map(l => {
                const p = l.split(/[ ,]+/);
                return { lat: parseFloat(p[0]), lon: parseFloat(p[1]) };
            }).filter(c => !isNaN(c.lat));

            let body = "";
            let pIdx = 1;

            // 從 F挪威02Z(17).gpx 實測數據逆推的最精確偏移比
            // Lat 偏移約 0.000227
            // Lon 偏移約 0.001131
            const dLat = 0.000227;
            const dLon = 0.001131;

            function addWpt(lat, lon) {
                body += `  <wpt lat="${lat.toFixed(8)}" lon="${lon.toFixed(8)}"><name>P${pIdx++}</name></wpt>\n`;
            }

            function makeZ(c) {
                const la = c.lat; 
                const lo = c.lon;

                // 嚴格遵循挪威檔 P1 到 P5 的點位邏輯
                addWpt(la - dLat, lo - dLon); // 第一點 (左下)
                addWpt(la + dLat, lo - dLon); // 第二點 (左上)
                addWpt(la, lo);               // 第三點 (原始中心點)
                addWpt(la - dLat, lo + dLon); // 第四點 (右下)
                addWpt(la + dLat, lo + dLon); // 第五點 (右上)
            }

            function makeLine(pts) { pts.forEach(c => addWpt(c.lat, c.lon)); }

            let fname = "";
            if (mode === 1) {
                fname = "效率掃描_Z.gpx";
                coords.forEach(c => makeZ(c));
            } else if (mode === 2) {
                fname = "直線串聯.gpx";
                makeLine(coords);
            } else if (mode === 3) {
                fname = "綜合模式_Z加2直線.gpx";
                coords.forEach(c => makeZ(c));
                makeLine(coords);
                makeLine(coords);
            }

            const head = '<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="PikminFinalV15">\n';
            const foot = '</gpx>';
            
            const blob = new Blob([head + body + foot], { type: "application/gpx+xml" });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url; a.download = fname; a.click();
            window.URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
